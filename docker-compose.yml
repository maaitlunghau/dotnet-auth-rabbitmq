services:
  mysql:
    image: mysql:latest
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "112233"
      MYSQL_DATABASE: "dotnet-auth-rabbitmq"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - auth-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge

volumes:
  mysql_data:
